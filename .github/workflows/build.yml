name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3

      - name: Build Release
        run: msbuild CCTV.slnx /p:Configuration=Release /p:Platform=x64

      - name: Upload EXE to Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            x64/Release/CCTV.exe
